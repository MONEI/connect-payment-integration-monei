name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  processor:
    name: Processor - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./processor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: processor/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  enabler:
    name: Enabler - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./enabler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: enabler/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
