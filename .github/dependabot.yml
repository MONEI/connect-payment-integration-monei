version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/processor"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "jimmyn"
    labels:
      - "dependencies"
      - "processor"

  - package-ecosystem: "npm"
    directory: "/enabler"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "jimmyn"
    labels:
      - "dependencies"
      - "enabler"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
