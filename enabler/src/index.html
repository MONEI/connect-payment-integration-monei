<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MONEI Payment Enabler - Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 40px; background: #f8f9fa; }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 24px; color: #1a1a1a; }
    .payment-method { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .payment-method h3 { font-size: 16px; margin-bottom: 16px; color: #333; }
    #card-container, #bizum-container, #googlepay-container, #applepay-container { min-height: 48px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MONEI Payment Test</h1>

    <div class="payment-method">
      <h3>Card</h3>
      <div id="card-container"></div>
    </div>

    <div class="payment-method">
      <h3>Bizum</h3>
      <div id="bizum-container"></div>
    </div>

    <div class="payment-method">
      <h3>Google Pay</h3>
      <div id="googlepay-container"></div>
    </div>

    <div class="payment-method">
      <h3>Apple Pay</h3>
      <div id="applepay-container"></div>
    </div>
  </div>
</body>
</html>
